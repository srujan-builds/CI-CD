name: Data Pipeline CI/CD

on: 
  push:
    branches: [ "main" ] # Runs every time you push to the main branch

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pytest

      - name: Run Unit Tests (The CI phase)
        run: pytest test_pipeline.py

      - name: Deploy to Production (The CD phase)
        if: success() # Only runs if the previous steps passed
        run: echo "Tests passed! Deploying data pipeline to production..."